name: Build & Release

# Triggers:
#   - Push a tag vX.Y.Z  → builds + creates a draft GitHub Release
#   - Open a PR to main  → builds only (CI check)
#   - Manual dispatch    → builds only
on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Apple Silicon + Intel in one .dmg)
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
            label: macOS

          # Windows 64-bit NSIS installer (.exe)
          - platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── Rust ────────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true   # keep cache even on failure to speed up reruns

      # ── macOS: system libraries (CoreAudio, Accessibility) are pre-installed ─
      # ── Windows: WebView2 + MSVC build tools are pre-installed on the runner ─

      # ── Frontend deps ───────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Tauri build + optional release ──────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing secrets (optional — unsigned build if not set)
          # macOS: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #        APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD,
          #        APPLE_TEAM_ID (for notarization)
          # Windows: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
        with:
          # tagName is non-empty only on tag pushes → creates a draft GitHub Release
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: Sayso __VERSION__
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `Sayso_VERSION_universal.dmg` |
            | Windows 64-bit | `Sayso_VERSION_x64-setup.exe` |

            ## First-run notes

            **macOS** — If Gatekeeper blocks the app, right-click → Open, or run:
            ```sh
            xattr -cr /Applications/Sayso.app
            ```
            Microphone and Accessibility permissions will be requested on first use.

            **Windows** — Click *More info → Run anyway* if Windows Defender SmartScreen appears.
          releaseDraft: true    # publish manually after reviewing the draft
          prerelease: false
          args: ${{ matrix.tauri-args }}
