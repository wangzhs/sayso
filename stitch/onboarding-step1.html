<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(28, 27, 27, 0.7);
            backdrop-filter: blur(20px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>

<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
<!-- Onboarding Shell: Digital Obsidian Modal -->
<main class="relative w-full max-w-4xl aspect-[16/10] flex flex-col glass-panel rounded-xl shadow-[0_40px_40px_0_rgba(0,0,0,0.4)] overflow-hidden border border-white/5">
<!-- Header / Progress Indicator -->
<header class="flex items-center justify-between px-10 py-8">
<div class="flex flex-col gap-1">
<span class="font-headline font-bold text-[#EF4444] tracking-widest text-xs uppercase">Step 1 of 3</span>
<div class="flex gap-4 mt-2 items-center">
<div class="flex flex-col gap-1">
<div class="h-1 w-16 bg-[#EF4444] rounded-full"></div>
<span class="text-[10px] uppercase tracking-tighter text-[#EF4444] font-bold">Welcome</span>
</div>
<div class="flex flex-col gap-1 opacity-30">
<div class="h-1 w-16 bg-surface-container-high rounded-full"></div>
<span class="text-[10px] uppercase tracking-tighter font-bold">STT Config</span>
</div>
<div class="flex flex-col gap-1 opacity-30">
<div class="h-1 w-16 bg-surface-container-high rounded-full"></div>
<span class="text-[10px] uppercase tracking-tighter font-bold">Permissions</span>
</div>
</div>
</div>
<div class="flex items-center gap-3">
<span class="font-headline font-bold text-lg tracking-tight text-primary">Sayso</span>
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
</div>
</header>
<!-- Dynamic Content Canvas -->
<div class="flex-1 px-10 pb-10 overflow-y-auto no-scrollbar flex items-center justify-center">
<!-- Step 1: Welcome -->
<section class="max-w-2xl mx-auto py-4 w-full">
<div class="flex flex-col items-center text-center space-y-8">
<div class="w-24 h-24 bg-primary-container flex items-center justify-center rounded-full shadow-[0_0_40px_rgba(255,84,81,0.3)]">
<span class="material-symbols-outlined text-5xl text-on-primary-container" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="space-y-4">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter">Welcome to Sayso</h1>
<p class="text-xl text-on-surface-variant max-w-md mx-auto">The open-source, private, and secure way to use your voice.</p>
</div>
<div class="grid grid-cols-3 gap-8 w-full py-8">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary">person_off</span>
<span class="text-xs font-bold uppercase tracking-widest">No Accounts</span>
</div>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary">credit_card_off</span>
<span class="text-xs font-bold uppercase tracking-widest">No Subs</span>
</div>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary">track_changes</span>
<span class="text-xs font-bold uppercase tracking-widest">No Tracking</span>
</div>
</div>
</div>
</section>
</div>

<footer class="px-10 py-8 flex items-center justify-end bg-surface-container-low/30 border-t border-white/5">
<button class="bg-primary-container text-on-primary-container px-10 py-3 rounded-md font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-primary-container/20">

            </button>
</footer>
</main>
<!-- Background Elements -->
<div class="fixed inset-0 -z-10 bg-background overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] bg-tertiary/5 blur-[120px] rounded-full"></div>
